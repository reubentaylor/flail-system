<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
<rect x="6" y="6" width="244" height="244" rx="8" fill="#c8302e" stroke="#000000" stroke-width="6"/>
<text x="128.0" y="72" font-family="Impact, Bebas Neue, sans-serif" font-size="42" font-weight="900" fill="#000000" text-anchor="middle" letter-spacing="2">POISONED</text>
<line x1="24" y1="114" x2="232" y2="114" stroke="#000000" stroke-width="2.5"/>
<text x="128.0" y="148" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#000000" text-anchor="middle">Take another</text>
<text x="128.0" y="176" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#000000" text-anchor="middle">Poisoned each dawn</text>
<text x="128.0" y="204" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#000000" text-anchor="middle">until all cleared</text>
<text x="128.0" y="216" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#000000" text-anchor="middle">Clear: seek medical</text>
<text x="128.0" y="238" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#000000" text-anchor="middle">healing</text>
</svg>